name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:

# Nötig für GitHub Pages Deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests (Pflicht vor Deploy)
        run: npm run test:run

      - name: Prepare Hoopte data snapshots
        run: npm run prepare:hoopte-data

      - name: Build
        run: npm run build
        env:
          # Vite braucht den base-Pfad für GitHub Pages
          # Ersetze 'zander-app' mit deinem tatsächlichen Repo-Namen
          VITE_BASE_URL: /ZanderHunter/
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
