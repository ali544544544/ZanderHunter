name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Nötig für GitHub Pages Deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (Pflicht vor Deploy)
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          # Vite braucht den base-Pfad für GitHub Pages
          # Ersetze 'zander-app' mit deinem tatsächlichen Repo-Namen
          VITE_BASE_URL: /ZanderHunter/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
